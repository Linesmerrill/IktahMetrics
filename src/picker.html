<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GruntRate · pick region</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      font-family: -apple-system, system-ui, sans-serif;
      background: rgba(0, 0, 0, 0.001);
    }
    #shade {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.30);
    }
    #rect {
      position: fixed;
      border: 2px solid #4ad1ff;
      background: rgba(74, 209, 255, 0.18);
      pointer-events: none;
      display: none;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.0);
    }
    #hint {
      position: fixed;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 20, 0.92);
      color: #f4f4f7;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      letter-spacing: 0.01em;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    #hint kbd {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: ui-monospace, monospace;
      font-size: 11px;
    }
    #size {
      position: fixed;
      background: rgba(15, 15, 20, 0.92);
      color: #fff;
      padding: 2px 6px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="shade"></div>
  <div id="rect"></div>
  <div id="size"></div>
  <div id="hint">
    Drag a rectangle around the <b>"~X xp / Y seconds"</b> text. <kbd>Esc</kbd> to cancel.
  </div>
  <script src="picker.js"></script>
</body>
</html>
